<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Favicon -->
<link rel="icon" type="image/png" href="favicon.png">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<!-- Theme & PWA -->
<meta name="theme-color" content="#302b63">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- SEO & Open Graph -->
<meta name="description" content="Ein ganz besonderes Geschenk wartet auf dich!">
<meta property="og:title" content="Dein Ueberraschungsgeschenk">
<meta property="og:description" content="Beantworte ein paar Fragen und finde heraus, was dich erwartet!">
<meta property="og:type" content="website">
<meta property="og:url" content="https://4hartman.github.io/KnoedelWird34/">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Sacramento&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Quicksand', sans-serif;
    overflow: hidden;
  }
  .bg {
    position: fixed; inset: 0; z-index: -2;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    transition: background 1.5s ease;
  }
  .bg.reveal-hiking { background: linear-gradient(135deg, #1a3a0a, #4a7a2c, #7ab35a); }
  .bg.reveal-london { background: linear-gradient(135deg, #1a1a2e, #b83227, #1a1a2e); }
  .bg.reveal-danzig { background: linear-gradient(135deg, #0d3b66, #e8c547, #d4812a); }

  .particles { position: fixed; inset: 0; pointer-events: none; z-index: -1; }
  .particle {
    position: absolute; width: 6px; height: 6px;
    background: rgba(255,255,255,0.12); border-radius: 50%;
    animation: pfloat linear infinite;
  }
  @keyframes pfloat {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  .card {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 44px 38px;
    max-width: 580px; width: 92%;
    text-align: center; color: #fff;
    animation: fadeIn 0.5s ease;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    position: relative;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(24px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card h2 {
    font-size: 0.85rem; text-transform: uppercase;
    letter-spacing: 3px; color: rgba(255,255,255,0.4);
    margin-bottom: 18px; font-weight: 600;
  }
  .question {
    font-size: 1.35rem; line-height: 1.55;
    margin-bottom: 28px; font-weight: 600;
  }
  .hint {
    background: rgba(255,255,255,0.05);
    border-left: 3px solid rgba(255,255,255,0.2);
    padding: 12px 16px; margin: 0 0 28px 0;
    border-radius: 0 12px 12px 0;
    font-size: 0.9rem; color: rgba(255,255,255,0.6);
    line-height: 1.5; font-style: italic; text-align: left;
  }
  .buttons { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  .btn {
    padding: 15px 32px; border: 2px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06); color: #fff;
    border-radius: 60px; font-size: 1rem;
    font-family: 'Quicksand', sans-serif; font-weight: 700;
    cursor: pointer; transition: all 0.3s ease; min-width: 150px;
  }
  .btn:hover {
    background: rgba(255,255,255,0.18);
    border-color: rgba(255,255,255,0.45);
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.25);
  }

  .progress { position: absolute; top: 0; left: 0; right: 0; height: 4px; border-radius: 24px 24px 0 0; overflow: hidden; }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #f7971e, #ffd200);
    border-radius: 4px; transition: width 0.6s ease;
  }

  .reveal-title { font-family: 'Sacramento', cursive; font-size: 3.5rem; margin-bottom: 8px; line-height: 1.2; }
  .reveal-destination { font-size: 2.1rem; font-weight: 700; letter-spacing: 2px; margin: 14px 0 22px; text-transform: uppercase; }
  .reveal-details { font-size: 1.02rem; line-height: 1.7; color: rgba(255,255,255,0.85); margin-bottom: 24px; text-align: left; }
  .emoji-big { font-size: 3.8rem; margin-bottom: 14px; display: block; }

  .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
  .confetti-piece {
    position: absolute; width: 10px; height: 10px; top: -10px;
    animation: cfall linear forwards;
  }
  @keyframes cfall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

// ─── Rendering ───────────────────────────
const app = document.getElementById('app');
const bg  = document.getElementById('bg');

function render(nodeId) {
  const n = nodes[nodeId];
  if (!n) return;

  bg.className = 'bg';

  if (n.type === 'reveal') {
    bg.classList.add(n.bgClass);
    launchConfetti();
    app.innerHTML =
      '<div class="card" style="max-width:620px">' +
        '<span class="emoji-big">' + n.emoji + '</span>' +
        '<div class="reveal-title">' + n.title + '</div>' +
        '<div class="reveal-destination">' + n.destination + '</div>' +
        '<div class="reveal-details">' + n.details + '</div>' +
        '<div class="buttons">' +
          '<button class="btn" onclick="render(\'start\')">Nochmal spielen</button>' +
        '</div>' +
      '</div>';
    return;
  }

  var pct = Math.round((n.step / MAX_STEP) * 100);
  var hintHTML = n.hint
    ? '<div class="hint">' + n.hint + '</div>'
    : '';
  var btns = '';
  for (var i = 0; i < n.options.length; i++) {
    btns += '<button class="btn" onclick="render(\'' + n.options[i].next + '\')">' + n.options[i].text + '</button>';
  }

  app.innerHTML =
    '<div class="card">' +
      '<div class="progress"><div class="progress-bar" style="width:' + pct + '%"></div></div>' +
      '<h2>Schritt ' + n.step + ' von ' + MAX_STEP + '</h2>' +
      '<div class="question">' + n.question + '</div>' +
      hintHTML +
      '<div class="buttons">' + btns + '</div>' +
    '</div>';
}

// ─── Confetti ────────────────────────────
function launchConfetti() {
  var c = document.getElementById('confetti');
  c.innerHTML = '';
  var cols = ['#f7971e','#ffd200','#ff6b6b','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#01a3a4'];
  for (var i = 0; i < 120; i++) {
    var p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + '%';
    p.style.background = cols[Math.floor(Math.random() * cols.length)];
    p.style.width  = (Math.random() * 8 + 6) + 'px';
    p.style.height = (Math.random() * 8 + 6) + 'px';
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    p.style.animationDuration = (Math.random() * 2 + 2) + 's';
    p.style.animationDelay    = (Math.random() * 1.5) + 's';
    c.appendChild(p);
  }
  setTimeout(function(){ c.innerHTML = ''; }, 5000);
}

// ─── Particles ───────────────────────────
(function() {
  var c = document.getElementById('particles');
  for (var i = 0; i < 30; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (Math.random() * 8 + 6) + 's';
    p.style.animationDelay    = (Math.random() * 10) + 's';
    p.style.width = p.style.height = (Math.random() * 4 + 3) + 'px';
    c.appendChild(p);
  }
})();

render('start');
</script>
</body>
</html>
